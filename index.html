<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nucleus Workstation v5.0</title>
    <style>
        :root { --bg: #020617; --sidebar: #0f172a; --accent: #818cf8; --text: #f1f5f9; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }
        #sidebar { width: 320px; background: var(--sidebar); border-right: 1px solid #1e293b; padding: 20px; display: flex; flex-direction: column; gap: 15px; overflow-y: auto; z-index: 10; }
        #canvas-container { flex-grow: 1; position: relative; }
        canvas { width: 100%; height: 100%; cursor: crosshair; }
        .form-group { background: #1e293b; padding: 12px; border-radius: 8px; display: flex; flex-direction: column; gap: 8px; }
        label { font-size: 0.65rem; color: #94a3b8; text-transform: uppercase; font-weight: bold; }
        input, select { background: #020617; border: 1px solid #334155; color: white; padding: 6px; border-radius: 4px; font-size: 0.8rem; }
        button { background: var(--accent); color: white; border: none; padding: 10px; border-radius: 6px; font-weight: bold; cursor: pointer; }
        #editPopup { position: absolute; display: none; background: #1e293b; border: 1px solid var(--accent); padding: 15px; border-radius: 8px; z-index: 100; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #coords { position: absolute; bottom: 10px; right: 10px; font-size: 0.7rem; font-family: monospace; color: var(--accent); }
    </style>
</head>
<body>

<div id="sidebar">
    <h2 style="color:var(--accent); margin:0; font-size:1.1rem;">NUCLEUS PRO</h2>

    <div class="form-group">
        <label>Add Data Point</label>
        <input type="text" id="pLabel" placeholder="Label">
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:5px;">
            <input type="number" id="pX" placeholder="X Coord">
            <input type="number" id="pY" placeholder="Y Coord">
        </div>
        <select id="pCat">
            <option value="Tech">Tech (Blue)</option>
            <option value="Finance">Finance (Green)</option>
            <option value="Health">Health (Red)</option>
        </select>
        <button id="addBtn">Add Point</button>
    </div>

    <div class="form-group">
        <label>Chart Metadata</label>
        <input type="text" id="chartTitleInput" placeholder="Chart Title">
    </div>

    <div class="form-group">
        <label>Styling & Appearance</label>
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <label>Background</label>
            <input type="color" id="bgColor" value="#020617">
        </div>
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <label>Label Font</label>
            <input type="number" id="fSize" value="12" style="width:50px">
        </div>
    </div>

    <div class="form-group">
        <label>Coordinate Jump</label>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:5px;">
            <input type="number" id="camX" value="0">
            <input type="number" id="camY" value="0">
        </div>
        <button id="setCamBtn">Go to Origin</button>
    </div>

    <button id="downloadBtn" style="background:transparent; border:1px solid var(--accent); color:var(--accent);">Download High-Res PNG</button>
    <button id="clearBtn" style="background:#ef4444; color:white;">Clear Workspace</button>
</div>

<div id="canvas-container">
    <canvas id="world"></canvas>
    <div id="coords">X: 0 | Y: 0 | Zoom: 1.0x</div>
    <div id="editPopup">
        <label>Edit Data Label</label>
        <input type="text" id="editLabel">
        <button id="saveEditBtn" style="margin-top:10px; width:100%;">Save</button>
    </div>
</div>

<script type="module">
    import { Nucleus } from './index.js';

    const canvas = document.getElementById('world');
    const hud = document.getElementById('coords');
    canvas.width = canvas.clientWidth;
    canvas.height = canvas.clientHeight;

    const data = [{ x: 0, y: 0, label: "ORIGIN_ZERO", category: "Tech" }];
    const chart = new Nucleus('#world', {});
    chart.render(data);

    let selectedPoint = null;

    // Manual Data Entry
    document.getElementById('addBtn').onclick = () => {
        data.push({
            x: parseFloat(document.getElementById('pX').value) || 0,
            y: -parseFloat(document.getElementById('pY').value) || 0,
            label: document.getElementById('pLabel').value || "Node",
            category: document.getElementById('pCat').value
        });
    };

    // Click to Add / Edit
    canvas.onclick = (e) => {
        const found = data.find(p => {
            const dist = Math.sqrt(Math.pow(chart.mouse.worldX - p.x, 2) + Math.pow(chart.mouse.worldY - p.y, 2));
            return dist < (20 / chart.camera.zoom);
        });

        if (found) {
            selectedPoint = found;
            const popup = document.getElementById('editPopup');
            popup.style.display = 'block';
            popup.style.left = e.clientX + 'px';
            popup.style.top = e.clientY + 'px';
            document.getElementById('editLabel').value = found.label;
        } else {
            document.getElementById('editPopup').style.display = 'none';
            // If clicking empty space, add a new point
            data.push({ x: chart.mouse.worldX, y: chart.mouse.worldY, label: "SEED_"+data.length, category: "Tech" });
        }
    };

    document.getElementById('saveEditBtn').onclick = () => {
        if (selectedPoint) {
            selectedPoint.label = document.getElementById('editLabel').value;
            document.getElementById('editPopup').style.display = 'none';
        }
    };

    // Sidebar Syncs
    document.getElementById('chartTitleInput').oninput = (e) => chart.chartTitle = e.target.value;
    document.getElementById('bgColor').oninput = (e) => chart.canvasColor = e.target.value;
    document.getElementById('fSize').oninput = (e) => chart.fontSize = parseInt(e.target.value);
    document.getElementById('setCamBtn').onclick = () => {
        chart.camera.x = parseFloat(document.getElementById('camX').value);
        chart.camera.y = -parseFloat(document.getElementById('camY').value);
    };

    document.getElementById('downloadBtn').onclick = () => {
        const link = document.createElement('a');
        link.download = 'nucleus-export.png';
        link.href = canvas.toDataURL();
        link.click();
    };

    document.getElementById('clearBtn').onclick = () => { data.length = 0; };

    function updateHUD() {
        hud.innerText = `X: ${Math.round(chart.mouse.worldX)} | Y: ${Math.round(-chart.mouse.worldY)} | Zoom: ${chart.camera.zoom.toFixed(2)}x`;
        requestAnimationFrame(updateHUD);
    }
    updateHUD();

    window.onresize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
</script>
</body>
</html>
