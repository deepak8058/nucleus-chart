<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nucleus Workstation v5.0</title>
    <style>
        :root { --bg: #020617; --sidebar: #0f172a; --accent: #818cf8; --text: #f1f5f9; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }
        #sidebar { width: 320px; background: var(--sidebar); border-right: 1px solid #1e293b; padding: 20px; display: flex; flex-direction: column; gap: 15px; overflow-y: auto; z-index: 10; }
        #canvas-container { flex-grow: 1; position: relative; }
        canvas { width: 100%; height: 100%; cursor: crosshair; }
        .form-group { background: #1e293b; padding: 12px; border-radius: 8px; display: flex; flex-direction: column; gap: 8px; }
        label { font-size: 0.65rem; color: #94a3b8; text-transform: uppercase; font-weight: bold; }
        input, select { background: #020617; border: 1px solid #334155; color: white; padding: 8px; border-radius: 4px; font-size: 0.8rem; }
        button { background: var(--accent); color: white; border: none; padding: 10px; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .edit-mode { border: 2px solid #fbbf24 !important; }
        #coords { position: absolute; bottom: 10px; right: 10px; font-size: 0.7rem; font-family: monospace; color: var(--accent); pointer-events: none; }
    </style>
</head>
<body>

<div id="sidebar">
    <h2 style="color:var(--accent); margin:0; font-size:1.1rem;">NUCLEUS PRO</h2>

    <div class="form-group" id="dataInputArea">
        <label id="inputTitle">Add New Point</label>
        <input type="text" id="pLabel" placeholder="Label Name">
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:5px;">
            <input type="number" id="pX" placeholder="X">
            <input type="number" id="pY" placeholder="Y">
        </div>
        <select id="pCat">
            <option value="Tech">Tech (Blue)</option>
            <option value="Finance">Finance (Green)</option>
            <option value="Health">Health (Red)</option>
        </select>
        <button id="addBtn">Submit Entry</button>
        <button id="cancelEdit" style="display:none; background:#475569;">Cancel Edit</button>
    </div>

    <div class="form-group">
        <label>Visual Workspace</label>
        <input type="text" id="chartTitleInput" placeholder="Set Chart Title">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <label>Background</label>
            <input type="color" id="bgColor" value="#020617">
        </div>
    </div>

    <div class="form-group">
        <label>Navigation</label>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:5px;">
            <input type="number" id="camX" value="0">
            <input type="number" id="camY" value="0">
        </div>
        <button id="setCamBtn">Center Camera</button>
    </div>

    <button id="downloadBtn" style="background:transparent; border:1px solid var(--accent); color:var(--accent);">Export Image</button>
    <button id="clearBtn" style="background:#ef4444; color:white;">Clear All</button>
</div>

<div id="canvas-container">
    <canvas id="world"></canvas>
    <div id="coords">X: 0 | Y: 0 | Zoom: 1.0x</div>
</div>

<script type="module">
    import { Nucleus } from './index.js';

    const canvas = document.getElementById('world');
    const hud = document.getElementById('coords');
    canvas.width = canvas.clientWidth;
    canvas.height = canvas.clientHeight;

    let data = [{ x: 0, y: 0, label: "ORIGIN_NODE", category: "Tech" }];
    let editingNode = null;

    const chart = new Nucleus('#world', {});
    chart.render(data);

    // Sidebar Logic
    const pLabel = document.getElementById('pLabel');
    const pX = document.getElementById('pX');
    const pY = document.getElementById('pY');
    const pCat = document.getElementById('pCat');
    const addBtn = document.getElementById('addBtn');
    const cancelEdit = document.getElementById('cancelEdit');
    const inputTitle = document.getElementById('inputTitle');

    addBtn.onclick = () => {
        if (editingNode) {
            // Apply Edits
            editingNode.label = pLabel.value;
            editingNode.x = parseFloat(pX.value);
            editingNode.y = -parseFloat(pY.value);
            editingNode.category = pCat.value;
            exitEditMode();
        } else {
            // Add New
            data.push({
                x: parseFloat(pX.value) || 0,
                y: -parseFloat(pY.value) || 0,
                label: pLabel.value || "New Node",
                category: pCat.value
            });
        }
    };

    function exitEditMode() {
        editingNode = null;
        inputTitle.innerText = "Add New Point";
        addBtn.innerText = "Submit Entry";
        cancelEdit.style.display = "none";
        pLabel.value = ""; pX.value = ""; pY.value = "";
    }

    cancelEdit.onclick = exitEditMode;

    canvas.onclick = (e) => {
        const found = data.find(p => {
            const dist = Math.sqrt(Math.pow(chart.mouse.worldX - p.x, 2) + Math.pow(chart.mouse.worldY - p.y, 2));
            return dist < (15 / chart.camera.zoom);
        });

        if (found) {
            // Enter Edit Mode
            editingNode = found;
            inputTitle.innerText = "Editing Node";
            addBtn.innerText = "Save Changes";
            cancelEdit.style.display = "block";
            pLabel.value = found.label;
            pX.value = found.x;
            pY.value = -found.y;
            pCat.value = found.category;
            pLabel.focus();
        } else {
            // Click to drop point
            data.push({ x: chart.mouse.worldX, y: chart.mouse.worldY, label: "Point_"+data.length, category: "Tech" });
        }
    };

    // Styling & Utilities
    document.getElementById('chartTitleInput').oninput = (e) => chart.chartTitle = e.target.value;
    document.getElementById('bgColor').oninput = (e) => chart.canvasColor = e.target.value;
    document.getElementById('setCamBtn').onclick = () => {
        chart.camera.x = parseFloat(document.getElementById('camX').value);
        chart.camera.y = -parseFloat(document.getElementById('camY').value);
    };
    document.getElementById('downloadBtn').onclick = () => {
        const link = document.createElement('a');
        link.download = 'nucleus-export.png';
        link.href = canvas.toDataURL();
        link.click();
    };
    document.getElementById('clearBtn').onclick = () => { data.length = 0; exitEditMode(); };

    function updateHUD() {
        hud.innerText = `X: ${Math.round(chart.mouse.worldX)} | Y: ${Math.round(-chart.mouse.worldY)} | Zoom: ${chart.camera.zoom.toFixed(2)}x`;
        requestAnimationFrame(updateHUD);
    }
    updateHUD();

    window.onresize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
</script>
</body>
</html>
