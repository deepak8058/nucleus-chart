<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nucleus OS | Spatial Data Engine</title>
    <style>
        :root { --accent: #818cf8; --glass: rgba(15, 23, 42, 0.8); }
        body { margin: 0; background: #020617; color: white; font-family: 'Inter', sans-serif; overflow: hidden; }
        
        /* Floating HUD */
        #hud {
            position: absolute; top: 20px; left: 20px; width: 300px;
            background: var(--glass); backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 16px;
            padding: 24px; pointer-events: all; z-index: 100;
        }

        canvas { width: 100vw; height: 100vh; display: block; }
        
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .stat-card { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 8px; text-align: center; }
        .stat-val { display: block; font-size: 1.2rem; font-weight: bold; color: var(--accent); }
        .stat-label { font-size: 0.6rem; text-transform: uppercase; opacity: 0.6; }

        .instructions { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); 
                        background: var(--glass); padding: 8px 20px; border-radius: 20px; font-size: 0.8rem; opacity: 0.8; }
    </style>
</head>
<body>

    <div id="hud">
        <h2 style="margin:0; font-size: 1.2rem; letter-spacing: 1px;">NUCLEUS <span style="font-weight:100">PRO</span></h2>
        <p style="font-size: 0.8rem; opacity: 0.7;">Enterprise Spatial Cluster Engine v2.5</p>
        
        <div class="stat-grid">
            <div class="stat-card"><span class="stat-val" id="nodeCount">0</span><span class="stat-label">Active Nodes</span></div>
            <div class="stat-card"><span class="stat-val" id="zoomVal">1.0x</span><span class="stat-label">Zoom Level</span></div>
        </div>

        <button id="clearBtn" style="width:100%; margin-top: 20px; padding: 10px; background: var(--accent); border: none; color: white; border-radius: 8px; cursor:pointer;">Initialize Wipe</button>
    </div>

    <div class="instructions">SCROLL to Zoom • CLICK to Seed Data • DRAG to Explore</div>

    <canvas id="world"></canvas>

    <script type="module">
        import { Nucleus } from './index.js';

        const canvas = document.getElementById('world');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const data = [
            { x: window.innerWidth/2, y: window.innerHeight/2, label: "CENTRAL_CORE", category: "Tech" },
            { x: window.innerWidth/2, y: window.innerHeight/2, label: "BACKUP_NODE", category: "Finance" }
        ];

        const chart = new Nucleus('#world', { 
            categoryColors: { 'Tech': '#60a5fa', 'Finance': '#4ade80' } 
        });

        // Start the continuous render loop
        chart.render(data);

        // Update HUD Stats
        setInterval(() => {
            document.getElementById('nodeCount').innerText = data.length;
            document.getElementById('zoomVal').innerText = chart.camera.zoom.toFixed(1) + 'x';
        }, 100);

        canvas.addEventListener('mousedown', (e) => {
            // Adjust for Camera Zoom/Offset if you want perfect placement
            data.push({ x: e.clientX, y: e.clientY, label: "NEW_DATA_STREAM", category: "Tech" });
        });
    </script>
</body>
</html>
