<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nucleus Workstation v3.0</title>
    <style>
        :root { --bg: #020617; --sidebar: #0f172a; --accent: #818cf8; --text: #f1f5f9; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }
        #sidebar { width: 320px; background: var(--sidebar); border-right: 1px solid #1e293b; padding: 20px; display: flex; flex-direction: column; gap: 15px; overflow-y: auto; }
        #canvas-container { flex-grow: 1; position: relative; }
        canvas { width: 100%; height: 100%; }

        .form-group { background: #1e293b; padding: 12px; border-radius: 8px; display: flex; flex-direction: column; gap: 8px; }
        label { font-size: 0.7rem; color: #94a3b8; text-transform: uppercase; }
        input, select { background: #020617; border: 1px solid #334155; color: white; padding: 6px; border-radius: 4px; font-size: 0.8rem; }
        button { background: var(--accent); color: white; border: none; padding: 10px; border-radius: 6px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div id="sidebar">
    <h2 style="color:var(--accent); margin:0; font-size:1.1rem;">NUCLEUS PRO</h2>

    <div class="form-group">
        <label>Camera Origin (X, Y)</label>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:5px;">
            <input type="number" id="camX" value="0">
            <input type="number" id="camY" value="0">
        </div>
        <button id="setCamBtn">Teleport to Origin</button>
    </div>

    <div class="form-group">
        <label>Visual Stylings</label>
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <label>Background</label>
            <input type="color" id="bgColor" value="#020617">
        </div>
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <label>Font Size</label>
            <input type="number" id="fSize" value="12" style="width:60px;">
        </div>
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <label>Grid Size</label>
            <input type="number" id="gSize" value="100" style="width:60px;">
        </div>
    </div>

    <div class="form-group">
        <label>Add Data Point</label>
        <input type="text" id="pLabel" placeholder="Label">
        <input type="number" id="pX" placeholder="X">
        <input type="number" id="pY" placeholder="Y">
        <select id="pCat">
            <option value="Tech">Tech (Blue)</option>
            <option value="Finance">Finance (Green)</option>
        </select>
        <button id="addBtn">Add to Map</button>
    </div>

    <button id="downloadBtn" style="background:transparent; border:1px solid var(--accent); color:var(--accent);">Download PNG</button>
    <button id="clearBtn" style="background:#ef4444; color:white;">Clear Chart</button>
</div>

<div id="canvas-container">
    <canvas id="world"></canvas>
</div>

<script type="module">
    import { Nucleus } from './index.js';

    const canvas = document.getElementById('world');
    canvas.width = canvas.clientWidth;
    canvas.height = canvas.clientHeight;

    const data = [{ x: 0, y: 0, label: "ORIGIN", category: "Tech" }];
    const chart = new Nucleus('#world', { 
        categoryColors: { 'Tech': '#60a5fa', 'Finance': '#4ade80' } 
    });

    chart.render(data);

    // Sidebar Controls
    document.getElementById('setCamBtn').onclick = () => {
        chart.camera.x = parseFloat(document.getElementById('camX').value);
        chart.camera.y = -parseFloat(document.getElementById('camY').value); // Invert Y for standard Cartesian
    };

    document.getElementById('bgColor').oninput = (e) => chart.canvasColor = e.target.value;
    document.getElementById('fSize').oninput = (e) => chart.fontSize = parseInt(e.target.value);
    document.getElementById('gSize').oninput = (e) => chart.gridSize = parseInt(e.target.value);

    document.getElementById('addBtn').onclick = () => {
        data.push({
            x: parseFloat(document.getElementById('pX').value),
            y: -parseFloat(document.getElementById('pY').value),
            label: document.getElementById('pLabel').value || "Node",
            category: document.getElementById('pCat').value
        });
    };

    document.getElementById('downloadBtn').onclick = () => {
        const link = document.createElement('a');
        link.download = 'nucleus-export.png';
        link.href = canvas.toDataURL();
        link.click();
    };

    document.getElementById('clearBtn').onclick = () => { data.length = 0; };

    // Canvas click - direct world coordinates
    canvas.onmousedown = () => {
        data.push({ x: chart.mouse.worldX, y: chart.mouse.worldY, label: "QuickSeed", category: "Tech" });
    };

    window.onresize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
</script>
</body>
</html>
