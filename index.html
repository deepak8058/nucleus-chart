<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nucleus Chart | Interactive Lab</title>
    <style>
        :root { --primary: #6366f1; --bg: #0f172a; --panel: #1e293b; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: white; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Sidebar Styles */
        #controls { width: 300px; background: var(--panel); padding: 2rem; border-right: 1px solid #334155; display: flex; flex-direction: column; gap: 1.5rem; }
        h1 { font-size: 1.5rem; margin: 0; color: var(--primary); }
        p { font-size: 0.9rem; color: #94a3b8; line-height: 1.5; }
        
        /* Canvas Area */
        #viewport { flex-grow: 1; display: flex; justify-content: center; align-items: center; position: relative; cursor: crosshair; }
        canvas { background: #020617; border-radius: 8px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        
        .badge { background: rgba(99, 102, 241, 0.2); color: var(--primary); padding: 4px 8px; border-radius: 4px; font-size: 0.75rem; font-weight: bold; }
        button { background: var(--primary); color: white; border: none; padding: 10px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        button:hover { opacity: 0.9; }
    </style>
</head>
<body>

    <div id="controls">
        <h1>🧬 Nucleus Chart</h1>
        <span class="badge">v1.0.0 Open Source</span>
        <p>Traditional charts suffer from "Label Soup." The Nucleus Chart uses deterministic radial projection to keep data readable.</p>
        
        <hr style="border: 0; border-top: 1px solid #334155; width: 100%;">
        
        <div>
            <label style="display:block; margin-bottom: 5px; font-size: 0.8rem;">Fusion Radius (px)</label>
            <input type="range" id="radiusRange" min="10" max="100" value="40" style="width:100%">
        </div>

        <button id="clearBtn">Clear Canvas</button>
        
        <div style="margin-top: auto; font-size: 0.8rem; color: #64748b;">
            <strong>Pro Tip:</strong> Click anywhere on the dark canvas to add overlapping points and watch the "Spokes" emerge.
        </div>
    </div>

    <div id="viewport">
        <canvas id="nucleusCanvas" width="900" height="600"></canvas>
    </div>

    <script type="module">
        import { Nucleus } from './index.js';

        const canvas = document.getElementById('nucleusCanvas');
        const radiusInput = document.getElementById('radiusRange');
        const clearBtn = document.getElementById('clearBtn');
        
        let dataPoints = [
            { x: 450, y: 300, label: "Sample A" },
            { x: 450, y: 300, label: "Sample B" }
        ];

        let chart = new Nucleus('#nucleusCanvas', { 
            fusionRadius: parseInt(radiusInput.value), 
            spokeLength: 80,
            hubColor: '#818cf8' 
        });

        // Initial Render
        chart.render(dataPoints);

        // Interaction: Add Point on Click
        canvas.addEventListener('mousedown', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            dataPoints.push({
                x: x,
                y: y,
                label: `Point #${dataPoints.length + 1}`
            });
            
            chart.render(dataPoints);
        });

        // Update Radius Dynamically
        radiusInput.addEventListener('input', (e) => {
            chart.fusionRadius = parseInt(e.target.value);
            chart.render(dataPoints);
        });

        // Clear
        clearBtn.addEventListener('click', () => {
            dataPoints = [];
            chart.render(dataPoints);
        });
    </script>
</body>
</html>
